<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    background: #0a0a0f;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .shield { font-size: 28px; }
  .title { font-size: 18px; font-weight: 700; }
  .subtitle { font-size: 11px; color: #64748b; }
  .status-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .status-label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
  .status-active {
    color: #22c55e;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .info-text { color: #94a3b8; font-size: 12px; line-height: 1.5; }
  .footer {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    text-align: center;
    color: #475569;
    font-size: 10px;
  }
  .open-btn {
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .open-btn:hover { background: #2563eb; }
</style>
</head>
<body>
  <div class="header">
    <div class="shield">🛡️</div>
    <div>
      <div class="title">Protego</div>
      <div class="subtitle">AI Security Firewall for Web3</div>
    </div>
  </div>
  
  <div class="status-card">
    <div class="status-label">PROTECTION STATUS</div>
    <div class="status-active">
      <div class="dot"></div>
      ACTIVE — Monitoring transactions
    </div>
  </div>
  
  <div class="status-card">
    <div class="status-label">HOW IT WORKS</div>
    <div class="info-text">
      Protego intercepts every transaction before 
      MetaMask opens and scans it for threats. 
      High risk transactions are blocked automatically.
    </div>
  </div>
  
  <button class="open-btn" onclick="window.open('https://protego-3oeb.vercel.app')">
    Open Protego Dashboard ↗
  </button>
  
  <div class="footer">
    Polkadot Hub TestNet · EVM + PVM Cross-VM Security
  </div>
</body>
</html>
